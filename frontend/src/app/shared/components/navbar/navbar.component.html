<header class="navbar">
  <div class="navbar-left d-flex align-items-center flex-grow-1">
    <div class="search-bar position-relative">
      <input type="text" class="search-input form-control rounded-pill" placeholder="Rechercher des stages, étudiants, conventions..." (keyup.enter)="onSearch($event)">
      <svg class="search-icon position-absolute" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <div class="search-shortcut">↵ Enter</div>
    </div>
  </div>

  <div class="navbar-right">
    <div class="user-profile">
      <div class="user-info-text text-right">
        <span class="user-name">{{ user()?.fullName }}</span>
        <span class="user-email text-muted">{{ user()?.email }}</span>
      </div>
      <div class="avatar-sm">{{ user()?.fullName?.charAt(0) || 'U' }}</div>
    </div>
    
    <button class="btn btn-outline btn-logout ml-3" (click)="logout()">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      Déconnexion
    </button>
  </div>
</header>
